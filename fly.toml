app = "csbot-api"
primary_region = "sin"

[build]

[env]
  ENV = "production"
  CHROMA_PATH = "/data/chroma"
  USE_MOCK_USER_API = "true"
  USER_API_BASE_URL = "https://csbot-api.fly.dev"
  USER_API_KEY = "mock-dev-token"
  MAX_RAG_CHUNKS = "5"
  RATE_LIMIT_PER_MINUTE = "20"
  ESCALATION_CONFIDENCE_THRESHOLD = "0.6"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "csbot_data"
  destination = "/data"
  initial_size = "3gb"
