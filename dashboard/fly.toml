app = "csbot-dashboard"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_URL = "https://csbot-api.fly.dev"
    VITE_SERVER_URL = "https://csbot-dashboard.fly.dev"

[env]
  NODE_ENV = "production"
  SERVER_PORT = "4000"
  FRONTEND_URL = "https://csbot-dashboard.fly.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
