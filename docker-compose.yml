version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # persist ChromaDB + SQLite across restarts
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

  widget:
    build:
      context: ./frontend/widget
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
